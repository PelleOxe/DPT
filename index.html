    <!-- Tailwind CSS v4 Play CDN för direkt rendering -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    
    <!-- Anpassade CSS-stilar från index.css -->
    <style type="text/tailwindcss">
      @import "tailwindcss";

body {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
}

.pwa-button {
  transition: transform 80ms cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 80ms ease;
  cursor: pointer;
}
.pwa-button:active {
  transform: translateY(2px) scale(0.97);
  box-shadow: 0 1px 2px rgba(0,0,0,0.3);
}

.device-tree-item {
  transition: background 0.2s ease;
}
.device-tree-item:hover {
  background-color: rgba(255, 255, 255, 0.05);
}

.glass-panel {
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.glass-panel-light {
  background: rgba(15, 23, 42, 0.03);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(15, 23, 42, 0.08);
}


    </style>
    </head>
  <body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">
    <div id="root"></div>
    <script type="module" src="./src/main.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registered successfully:', reg.scope))
            .catch(err => console.error('Service Worker registration failed:', err));
        });
      }
    </script>
  
    <!-- Registrera Service Worker för PWA-installationsstöd och offline-läge -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Service Worker registrerad för appen!', reg))
            .catch(err => console.log('Service Worker misslyckades:', err));
        });
      }
    </script>
    </body>
</html>
